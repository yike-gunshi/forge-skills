<svg width="100%" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg"><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><style>text{font-family:system-ui,sans-serif}.t{font-size:13px;font-weight:500}.s{font-size:10.5px;fill:#64748B}.h{font-size:14px;font-weight:500}.p{font-size:11px;font-weight:500}</style><text x="340" y="22" text-anchor="middle" class="h" fill="#065F46">forge-design 分级门控 + 自动升级</text><rect x="20" y="40" width="640" height="90" rx="12" fill="#FFF1F2" stroke="#FECDD3"/><text x="35" y="60" class="t" fill="#9F1239">L1 完整设计（不可跳过）</text><text x="35" y="78" class="s" fill="#334155">触发：新项目 · 新页面 · 新功能模块 · 迭代≥3次自动升级</text><text x="35" y="93" class="s" fill="#334155">流程：竞品调研 → 美学方向(3+) → 配色字体搜索 → Token体系 → 99条UX审计 → 0-10评分</text><text x="35" y="108" class="s" fill="#334155">→ 反AI-slop检测 → 子模块一致性检查 → A-F评分 → DESIGN.md</text><rect x="525" y="98" width="120" height="25" rx="6" fill="#FFF1F2" stroke="#FECDD3"/><text x="585" y="115" text-anchor="middle" class="p" fill="#9F1239">门槛：≥ B</text><rect x="20" y="145" width="640" height="70" rx="12" fill="#FFFBEB" stroke="#FDE68A"/><text x="35" y="165" class="t" fill="#92400E">L2 轻量审查</text><text x="35" y="183" class="s" fill="#334155">触发：迭代已有功能 · 样式微调 · 小组件添加</text><text x="35" y="198" class="s" fill="#334155">流程：读DESIGN.md → 重点10项审计 → 一致性验证 → 快速评分</text><rect x="525" y="188" width="120" height="25" rx="6" fill="#FFFBEB" stroke="#FDE68A"/><text x="585" y="205" text-anchor="middle" class="p" fill="#92400E">门槛：≥ C</text><rect x="20" y="230" width="640" height="50" rx="12" fill="#ECFDF5" stroke="#A7F3D0"/><text x="35" y="250" class="t" fill="#065F46">L3 跳过（仅限后端）</text><text x="35" y="268" class="s" fill="#334155">触发：纯后端API · 纯数据处理 · 无UI变更 → 直接进 forge-eng</text><rect x="20" y="300" width="310" height="80" rx="12" fill="#F0F9FF" stroke="#BAE6FD"/><text x="35" y="322" class="t" fill="#075985">自动升级触发器 1</text><text x="35" y="340" class="s" fill="#334155">PRD CHANGELOG 同一模块 ≥ 3 次</text><text x="35" y="355" class="s" fill="#334155">→ 自动从 L2 升级到 L1</text><text x="35" y="370" class="s" fill="#E11D48">不再打补丁，强制重新设计</text><rect x="350" y="300" width="310" height="80" rx="12" fill="#F0F9FF" stroke="#BAE6FD"/><text x="365" y="322" class="t" fill="#075985">自动升级触发器 2</text><text x="365" y="340" class="s" fill="#334155">子模块与父页面 DESIGN.md 不一致</text><text x="365" y="355" class="s" fill="#334155">→ 必须修正或获得用户明确许可</text><text x="365" y="370" class="s" fill="#E11D48">同一需求下子模块风格必须统一</text></svg>
