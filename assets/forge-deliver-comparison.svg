<svg width="100%" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg"><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><style>text{font-family:system-ui,sans-serif}.t{font-size:13px;font-weight:500}.s{font-size:10.5px;fill:#64748B}.h{font-size:14px;font-weight:600}.p{font-size:11px;font-weight:500}.r{font-size:10px;fill:#DC2626;font-weight:500}.g{font-size:10px;fill:#059669;font-weight:500}</style><text x="340" y="22" text-anchor="middle" class="h" fill="#1E293B">forge-deliver v1 vs v2 对比</text><rect x="20" y="40" width="310" height="35" rx="8" fill="#FFF1F2" stroke="#FECDD3"/><text x="175" y="63" text-anchor="middle" class="t" fill="#9F1239">v1（单体流水线·10 Phase）</text><rect x="350" y="40" width="310" height="35" rx="8" fill="#ECFDF5" stroke="#A7F3D0"/><text x="505" y="63" text-anchor="middle" class="t" fill="#065F46">v2（纯编排层·8 Phase）</text><rect x="20" y="85" width="310" height="55" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="35" y="103" class="p" fill="#334155">Phase 0-1: 需求+产品审查（自己做）</text><text x="35" y="118" class="s">解析输入 → 10星挑战 → 范围决策</text><text x="35" y="130" class="r">✗ 无发散讨论、无前提挑战</text><rect x="350" y="85" width="310" height="55" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="365" y="103" class="p" fill="#334155">Phase 0: 调用 brainstorm + prd</text><text x="365" y="118" class="s">4模式发散 + 结构化PRD + 前提挑战</text><text x="365" y="130" class="g">✓ 子Skill完整能力</text><rect x="20" y="150" width="310" height="55" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="35" y="168" class="p" fill="#334155">Phase 2: 设计审查（~30行简化）</text><text x="35" y="183" class="s">检查现有体系 + 简单推荐</text><text x="35" y="195" class="r">✗ 无UX规则、无搜索引擎、无门控</text><rect x="350" y="150" width="310" height="55" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="365" y="168" class="p" fill="#334155">Phase 1: 调用 design + design-impl</text><text x="365" y="183" class="s">695行自闭环 + 分级门控 + Token体系</text><text x="365" y="195" class="g">✓ 子Skill完整能力</text><rect x="20" y="215" width="310" height="55" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="35" y="233" class="p" fill="#334155">Phase 3-4: 方案+实现（自己逐文件编码）</text><text x="35" y="248" class="s">无隔离、无TDD、无验证门控</text><text x="35" y="260" class="r">✗ 质量保障全缺</text><rect x="350" y="215" width="310" height="55" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="365" y="233" class="p" fill="#334155">Phase 2: 调用 forge-eng</text><text x="365" y="248" class="s">Worktree + 四级TDD + Wave + Verification</text><text x="365" y="260" class="g">✓ 子Skill完整能力</text><rect x="20" y="280" width="310" height="55" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="35" y="298" class="p" fill="#334155">Phase 5: QA（测试+修复混合）</text><text x="35" y="313" class="s">发现bug直接修，容易引入新bug</text><text x="35" y="325" class="r">✗ 核心痛点所在</text><rect x="350" y="280" width="310" height="55" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="365" y="298" class="p" fill="#334155">Phase 3: 调用 forge-qa（纯验收）</text><text x="365" y="313" class="s">只测不修 + QA-Eng修复循环(≤2轮)</text><text x="365" y="325" class="g">✓ 修复回forge-eng走TDD</text><rect x="20" y="345" width="310" height="45" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="35" y="363" class="p" fill="#334155">Phase 6-8: 审查+发布+文档（简化版）</text><text x="35" y="378" class="s">各~30行简化实现</text><rect x="350" y="345" width="310" height="45" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="365" y="363" class="p" fill="#334155">Phase 4-6: 调用 review+ship+doc-release</text><text x="365" y="378" class="g">✓ 子Skill完整能力</text><rect x="20" y="400" width="310" height="45" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="35" y="418" class="p" fill="#334155">Phase 9: 验收报告（自己汇总）</text><text x="35" y="433" class="g">✓ 这部分合理</text><rect x="350" y="400" width="310" height="45" rx="6" fill="#FFF" stroke="#E2E8F0"/><text x="365" y="418" class="p" fill="#334155">Phase 7: 验收报告（自己汇总）</text><text x="365" y="433" class="g">✓ 保持不变</text><rect x="20" y="465" width="640" height="140" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/><text x="340" y="488" text-anchor="middle" class="h" fill="#334155">关键差异</text><text x="35" y="510" class="p" fill="#334155">v1 独有（v2 保留）：</text><text x="35" y="528" class="g">✓ --auto 全自动模式 | ✓ --resume 检查点恢复 | ✓ state.json 状态持久化</text><text x="35" y="550" class="p" fill="#334155">v2 独有（v1 缺失）：</text><text x="35" y="568" class="g">✓ 纯编排不实现 | ✓ 子Skill满配能力 | ✓ QA-Eng修复循环 | ✓ 证据先于断言</text><text x="35" y="590" class="p" fill="#9F1239">v2 解决的 v1 痛点：</text><text x="35" y="605" class="s" fill="#334155">设计审查从30行→695行 | 工程实现增加Worktree+TDD+Verification | QA从混合修复→纯验收+回forge-eng</text></svg>
