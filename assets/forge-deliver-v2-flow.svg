<svg width="100%" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg"><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><style>text{font-family:system-ui,sans-serif}.t{font-size:13px;font-weight:500}.s{font-size:10.5px;fill:#64748B}.h{font-size:14px;font-weight:600}.p{font-size:11px;font-weight:500}</style><text x="340" y="22" text-anchor="middle" class="h" fill="#1E293B">forge-deliver v2 编排流程</text><rect x="240" y="35" width="200" height="35" rx="8" fill="#F0F9FF" stroke="#BAE6FD"/><text x="340" y="57" text-anchor="middle" class="t" fill="#075985">deliver 编排层</text><text x="340" y="90" text-anchor="middle" class="s">（自身不做领域工作，只调度+管状态）</text><line x1="340" y1="100" x2="340" y2="120" stroke="#818CF8" stroke-width="1.5" marker-end="url(#a)"/><rect x="150" y="120" width="380" height="55" rx="12" fill="#FFFBEB" stroke="#FDE68A"/><text x="170" y="140" class="p" fill="#92400E">Phase 0: 需求理解</text><text x="170" y="155" class="s" fill="#334155">调用 forge-brainstorm（可选）→ forge-prd</text><text x="170" y="168" class="s" fill="#334155">产出 → .deliver/requirement.md</text><rect x="540" y="128" width="100" height="20" rx="4" fill="#FEF3C7"/><text x="590" y="142" text-anchor="middle" class="s" fill="#92400E">⏸ 硬卡点</text><line x1="340" y1="175" x2="340" y2="195" stroke="#818CF8" stroke-width="1.5" marker-end="url(#a)"/><rect x="150" y="195" width="380" height="55" rx="12" fill="#ECFDF5" stroke="#A7F3D0"/><text x="170" y="215" class="p" fill="#065F46">Phase 1: 设计（backend跳过）</text><text x="170" y="230" class="s" fill="#334155">调用 forge-design → forge-design-impl</text><text x="170" y="243" class="s" fill="#334155">产出 → .deliver/design.md + design-impl-report.md</text><line x1="340" y1="250" x2="340" y2="270" stroke="#818CF8" stroke-width="1.5" marker-end="url(#a)"/><rect x="150" y="270" width="380" height="55" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/><text x="170" y="290" class="p" fill="#3730A3">Phase 2: 工程</text><text x="170" y="305" class="s" fill="#334155">调用 forge-eng（Worktree+TDD+Wave+Verification）</text><text x="170" y="318" class="s" fill="#334155">产出 → .deliver/eng-report.md</text><rect x="540" y="278" width="100" height="20" rx="4" fill="#FEF3C7"/><text x="590" y="292" text-anchor="middle" class="s" fill="#92400E">⏸ 硬卡点</text><line x1="340" y1="325" x2="340" y2="345" stroke="#818CF8" stroke-width="1.5" marker-end="url(#a)"/><rect x="150" y="345" width="380" height="65" rx="12" fill="#FFF1F2" stroke="#FECDD3"/><text x="170" y="365" class="p" fill="#9F1239">Phase 3: QA（纯验收）</text><text x="170" y="380" class="s" fill="#334155">调用 forge-qa → 有bug回 forge-eng → 再验证</text><text x="170" y="393" class="s" fill="#334155">最多2轮QA-Eng循环 | 产出 → .deliver/qa-report.md</text><text x="170" y="405" class="s" fill="#E11D48">遗留bug记录到报告，不阻塞流水线</text><path d="M530 370 Q570 370 570 310 Q570 295 530 295" fill="none" stroke="#E11D48" stroke-width="1" stroke-dasharray="4" marker-end="url(#a)"/><text x="580" y="335" class="s" fill="#E11D48">≤2轮</text><line x1="340" y1="410" x2="340" y2="430" stroke="#818CF8" stroke-width="1.5" marker-end="url(#a)"/><rect x="150" y="430" width="380" height="45" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/><text x="170" y="450" class="p" fill="#334155">Phase 4: 审查</text><text x="170" y="465" class="s" fill="#334155">调用 forge-review | 产出 → .deliver/review-report.md</text><line x1="340" y1="475" x2="340" y2="495" stroke="#818CF8" stroke-width="1.5" marker-end="url(#a)"/><rect x="150" y="495" width="380" height="45" rx="12" fill="#F0F9FF" stroke="#BAE6FD"/><text x="170" y="515" class="p" fill="#075985">Phase 5: 发布</text><text x="170" y="530" class="s" fill="#334155">调用 forge-ship（auto模式跳过）| 产出 → .deliver/ship-report.md</text><line x1="340" y1="540" x2="340" y2="560" stroke="#818CF8" stroke-width="1.5" marker-end="url(#a)"/><rect x="150" y="560" width="380" height="45" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/><text x="170" y="580" class="p" fill="#334155">Phase 6: 文档</text><text x="170" y="595" class="s" fill="#334155">调用 forge-doc-release | 产出 → .deliver/doc-release-report.md</text><line x1="340" y1="605" x2="340" y2="625" stroke="#818CF8" stroke-width="1.5" marker-end="url(#a)"/><rect x="150" y="625" width="380" height="55" rx="12" fill="#F5F3FF" stroke="#DDD6FE"/><text x="170" y="645" class="p" fill="#5B21B6">Phase 7: 验收（deliver自身汇总）</text><text x="170" y="660" class="s" fill="#334155">汇总所有 .deliver/*.md → acceptance-report.md</text><text x="170" y="673" class="s" fill="#334155">唯一一个deliver自己执行的Phase</text><rect x="540" y="633" width="100" height="20" rx="4" fill="#FEF3C7"/><text x="590" y="647" text-anchor="middle" class="s" fill="#92400E">⏸ 硬卡点</text></svg>
